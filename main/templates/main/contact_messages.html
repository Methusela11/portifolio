{% load static %}
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Contact Messages</title><link rel="stylesheet" href="{% static 'main/css/style.css' %}"></head><body>{% include 'main/navbar.html' %}<section class="page"><h2>Contact Messages (Admin)</h2>{% if messages_list %}<table class="admin-table"><thead><tr><th>Name</th><th>Email</th><th>Message</th><th>Date</th></tr></thead><tbody>{% for m in messages_list %}<tr><td>{{ m.name }}</td><td>{{ m.email }}</td><td>{{ m.message }}</td><td>{{ m.created_at|date:'Y-m-d H:i' }}</td></tr>{% endfor %}</tbody></table>{% else %}<p>No messages yet.</p>{% endif %}</section></body></html>
