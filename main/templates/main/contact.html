{% load static %}
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Contact | Portfolio</title><link rel="stylesheet" href="{% static 'main/css/style.css' %}"><link rel="icon" type="image/png" href="{% static 'main/img/profile_circle.png' %}"></head><body>{% include 'main/navbar.html' %}<section class="contact page"><h3>Contact Me</h3>{% if messages %}<div id="message-container">{% for message in messages %}<div class="alert {{ message.tags }}">{{ message }}</div>{% endfor %}</div>{% endif %}<form action="{% url 'contact' %}" method="post" class="contact-form">{% csrf_token %}<div class="form-group"><label for="name">Your Name</label><input type="text" id="name" name="name" required></div><div class="form-group"><label for="email">Your Email</label><input type="email" id="email" name="email" required></div><div class="form-group"><label for="message">Your Message</label><textarea id="message" name="message" rows="5" required></textarea></div><button type="submit" class="btn primary">Send Message</button></form></section><script>setTimeout(()=>{const c=document.getElementById('message-container'); if(c){c.style.transition='opacity .5s ease'; c.style.opacity='0'; setTimeout(()=>c.remove(),500);} },3000);</script></body></html>
